name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# The workflow never stores signing material in git. Configure the four
# CLOCKIN_* repository secrets described in docs/RELEASE_GUIDE.md.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore signing key
        env:
          CLOCKIN_KEYSTORE_BASE64: ${{ secrets.CLOCKIN_KEYSTORE_BASE64 }}
        run: |
          mkdir -p .signing
          printf '%s' "$CLOCKIN_KEYSTORE_BASE64" \
            | base64 --decode \
            > .signing/clockin-release.p12

      - name: Verify tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(
            sed -n 's/^[[:space:]]*versionName "\([^"]*\)".*/\1/p' \
              app/build.gradle
          )"
          test -n "$APP_VERSION"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Build signed release
        env:
          CLOCKIN_KEYSTORE_FILE: ${{ github.workspace }}/.signing/clockin-release.p12
          CLOCKIN_KEYSTORE_PASSWORD: ${{ secrets.CLOCKIN_KEYSTORE_PASSWORD }}
          CLOCKIN_KEY_ALIAS: ${{ secrets.CLOCKIN_KEY_ALIAS }}
          CLOCKIN_KEY_PASSWORD: ${{ secrets.CLOCKIN_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleRelease \
            -PgithubUpdateRepo="${{ github.repository }}"

      - name: Prepare release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK="app/build/outputs/apk/release/app-release.apk"
          OUTPUT="check-in-${VERSION}.apk"
          test -f "$APK"
          cp "$APK" "$OUTPUT"
          sha256sum "$OUTPUT" > "${OUTPUT}.sha256"
          echo "RELEASE_APK=$OUTPUT" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RELEASE_APK" \
            "$RELEASE_APK.sha256" \
            --verify-tag \
            --generate-notes \
            --title "Check in ${GITHUB_REF_NAME}"
